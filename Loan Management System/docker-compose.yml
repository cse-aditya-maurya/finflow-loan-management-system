networks:
  finflow-network:
    driver: bridge

volumes:
  zipkin-data:

services:
  # ── 1. Config Server ──────────────────────
  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - finflow-network
    environment:
      - SPRING_PROFILES_ACTIVE=native
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── 2. Eureka Server ──────────────────────
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - finflow-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ── 3. Zipkin ─────────────────────────────
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - finflow-network
    volumes:
      - zipkin-data:/zipkin
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9411/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 4. Auth Service ───────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    init: true
    ports:
      - "8081:8081"
    networks:
      - finflow-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
      - JWT_SECRET=finflow_super_secure_jwt_secret_key_2026_project_backend
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/auth_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Adi@2552
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health; RET=$$?; if [ $$RET -eq 0 ] || [ $$RET -eq 8 ]; then exit 0; else exit 1; fi"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── 5. Application Service ────────────────
  application-service:
    build:
      context: ./application-service
      dockerfile: Dockerfile
    container_name: application-service
    init: true
    ports:
      - "8082:8082"
    networks:
      - finflow-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
      - JWT_SECRET=finflow_super_secure_jwt_secret_key_2026_project_backend
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/application_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Adi@2552
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health; RET=$$?; if [ $$RET -eq 0 ] || [ $$RET -eq 8 ]; then exit 0; else exit 1; fi"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── 6. Admin Service ──────────────────────
  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    init: true
    ports:
      - "8084:8084"
    networks:
      - finflow-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
      - JWT_SECRET=finflow_super_secure_jwt_secret_key_2026_project_backend
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/admin_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Adi@2552
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8084/actuator/health; RET=$$?; if [ $$RET -eq 0 ] || [ $$RET -eq 8 ]; then exit 0; else exit 1; fi"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── 7. Document Service ───────────────────
  document-service:
    build:
      context: ./document-service
      dockerfile: Dockerfile
    container_name: document-service
    init: true
    ports:
      - "8083:8083"
    networks:
      - finflow-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info
      - MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS=always
      - JWT_SECRET=finflow_super_secure_jwt_secret_key_2026_project_backend
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/document_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Adi@2552
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      - FILE_UPLOAD_DIR=/app/uploads
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8083/actuator/health; RET=$$?; if [ $$RET -eq 0 ] || [ $$RET -eq 8 ]; then exit 0; else exit 1; fi"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── 8. API Gateway ────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    init: true
    ports:
      - "8080:8080"
    networks:
      - finflow-network
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - MANAGEMENT_ZIPKIN_TRACING_ENDPOINT=http://zipkin:9411/api/v2/spans
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info
      - JWT_SECRET=finflow_super_secure_jwt_secret_key_2026_project_backend
      - JWT_EXPIRATION=86400000
    depends_on:
      auth-service:
        condition: service_healthy
      application-service:
        condition: service_healthy
      admin-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health; RET=$$?; if [ $$RET -eq 0 ] || [ $$RET -eq 8 ]; then exit 0; else exit 1; fi"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
